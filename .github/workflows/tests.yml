name: Run tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_call' && github.sha || github.head_ref || github.ref_name || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - development
  merge_group:
    types:
      - checks_requested
  workflow_call:
    inputs:
      run_capgo:
        type: boolean
        required: false
        default: true
      run_cli:
        type: boolean
        required: false
        default: true
      run_notifications:
        type: boolean
        required: false
        default: true

permissions: {}

env:
  DENO_DIR: my_cache_directory
  CLICOLOR: '1'

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_capgo: ${{ steps.set.outputs.capgo }}
      run_cli: ${{ steps.set.outputs.cli }}
      run_notifications: ${{ steps.set.outputs.notifications }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        if: github.event_name != 'workflow_call'
        uses: actions/checkout@v6 # v6
        with:
          # Keep a stable merge base for paths-filter on long-lived branches.
          fetch-depth: 0
          filter: blob:none

      - name: Detect changed paths
        if: github.event_name != 'workflow_call'
        id: filter
        uses: dorny/paths-filter@v4 # v3
        with:
          filters: |
            shared:
              - '.github/workflows/**'
              - '.github/scripts/**'
              - 'scripts/release-scope.ts'
              - 'scripts/sync-notifications-package-version.ts'
              - 'scripts/setup-bun.sh'
              - 'scripts/setup-bun.ps1'
              - '.npmrc'
              - '.typos.toml'
              - 'package.json'
              - 'bun.lock'
              - 'bunfig.toml'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'vitest.config.cloudflare.ts'
              - 'vitest.config.cloudflare-plugin.ts'
            cli:
              - 'cli/**'
            notifications:
              - 'packages/capacitor-notifications/**'
            capgo:
              - 'aliproxy/**'
              - 'android/**'
              - 'assets/**'
              - 'benches/**'
              - 'cloudflare_workers/**'
              - 'codemagic.yaml'
              - 'configs.json'
              - 'deno-env.d.ts'
              - 'deno.lock'
              - 'eslint.config.js'
              - 'formkit.config.ts'
              - 'formkit.theme.ts'
              - 'icons/**'
              - 'index.html'
              - 'internal/**'
              - 'ionic.config.json'
              - 'ios/**'
              - 'jean.json'
              - 'messages/**'
              - 'playwright/**'
              - 'playwright.config.ts'
              - 'project.inlang'
              - 'public/**'
              - 'read_replicate/**'
              - 'scriptable/**'
              - 'scripts/**'
              - 'shared/**'
              - 'sql/**'
              - 'src/**'
              - 'supabase/**'
              - 'tests/**'
              - 'capacitor.config.ts'
              - 'vite.config.mts'
              - 'vitest.config.bench.ts'
              - 'wrangler.jsonc'

      - name: Resolve workflow scope
        id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RUN_CAPGO: ${{ inputs.run_capgo }}
          INPUT_RUN_CLI: ${{ inputs.run_cli }}
          INPUT_RUN_NOTIFICATIONS: ${{ inputs.run_notifications }}
          FILTER_CAPGO: ${{ steps.filter.outputs.capgo }}
          FILTER_CLI: ${{ steps.filter.outputs.cli }}
          FILTER_NOTIFICATIONS: ${{ steps.filter.outputs.notifications }}
          FILTER_SHARED: ${{ steps.filter.outputs.shared }}
        run: |
          if [ "$EVENT_NAME" = "workflow_call" ]; then
            echo "capgo=$INPUT_RUN_CAPGO" >> "$GITHUB_OUTPUT"
            echo "cli=$INPUT_RUN_CLI" >> "$GITHUB_OUTPUT"
            echo "notifications=$INPUT_RUN_NOTIFICATIONS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_capgo=false
          run_cli=false
          run_notifications=false

          if [ "$FILTER_CAPGO" = "true" ] || [ "$FILTER_SHARED" = "true" ]; then
            run_capgo=true
          fi

          if [ "$FILTER_CLI" = "true" ] || [ "$FILTER_SHARED" = "true" ]; then
            run_cli=true
          fi

          if [ "$FILTER_NOTIFICATIONS" = "true" ] || [ "$FILTER_SHARED" = "true" ]; then
            run_notifications=true
          fi

          echo "capgo=$run_capgo" >> "$GITHUB_OUTPUT"
          echo "cli=$run_cli" >> "$GITHUB_OUTPUT"
          echo "notifications=$run_notifications" >> "$GITHUB_OUTPUT"

  dead_code:
    needs: changes
    if: needs.changes.outputs.run_capgo == 'true' || needs.changes.outputs.run_cli == 'true' || needs.changes.outputs.run_notifications == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Check dead code
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install dependencies
        run: bun install
      - name: Check dead code
        run: bun run lint:deadcode

  notifications_package:
    needs: changes
    if: needs.changes.outputs.run_notifications == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Notifications plugin package
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck notifications plugin
        run: bun run --cwd packages/capacitor-notifications typecheck
      - name: Build notifications plugin
        run: bun run --cwd packages/capacitor-notifications build
      - name: Verify notifications publish access
        run: bunx vitest run tests/release-scope.test.ts

  lint_typecheck:
    needs: changes
    if: needs.changes.outputs.run_capgo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Lint and typecheck
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
        with:
          fetch-depth: 2
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Validate migration timestamps
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: bash scripts/check-supabase-migration-order.sh
      - name: Check for typos
        uses: crate-ci/typos@v1 # v1.45.1
      - name: Check for console statements
        run: |
          if grep -r --exclude="logging.ts" --exclude=".env" --exclude=".env.*" "console\." supabase/functions/; then
            echo "Found console statements in supabase/functions directory, use cloudlog instead"
            exit 1
          else
            echo "No console statements found in supabase/functions directory"
          fi
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun lint && bun lint:backend
      - name: Typecheck
        run: bun typecheck

  test_unit:
    needs: changes
    if: needs.changes.outputs.run_capgo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Run unit tests
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install dependencies
        run: bun install
      - name: Run unit tests
        run: bun run test:unit

  test_db:
    needs: changes
    if: needs.changes.outputs.run_capgo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Run DB tests (Tinbase)
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Cache Tinbase Postgres binaries
        uses: actions/cache@v5 # v5
        with:
          path: ~/.cache/tinbase
          key: tinbase-postgres-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install
      - name: Run DB tests against Tinbase
        run: bash scripts/test-db-tinbase.sh

  test_backend:
    needs: changes
    if: needs.changes.outputs.run_capgo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Run backend tests (shard ${{ matrix.shard }})
    permissions:
      contents: read
      actions: write
    concurrency:
      group: capgo-local-services-backend-${{ github.repository }}-${{ matrix.shard }}
      cancel-in-progress: false
    env:
      SUPABASE_WORKTREE_INSTANCE: backend-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.shard }}
      SUPABASE_WORKTREE_PORT_OFFSET: ${{ matrix.supabase_port_offset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1/2
            supabase_port_offset: 2000
          - shard: 2/2
            supabase_port_offset: 2100
    steps:
      - name: Cache Deno dependencies
        uses: actions/cache@v5 # v5
        with:
          path: ${{ env.DENO_DIR }}
          key: my_cache_key
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
        with:
          fetch-depth: 2
      - name: Setup Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: 24.x
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2 # v2.0.0
        with:
          version: 2.84.2
      - name: Link Supabase templates
        run: ln -sfn supabase/templates templates
      - name: Stop this job's Supabase stack
        run: bun scripts/supabase-worktree.ts stop --no-backup || true
      - name: Run Supabase Start (deps and PostgreSQL 17 client install in background)
        run: |
          (
            set -e
            bun install
          ) > "${RUNNER_TEMP}/deps-install.log" 2>&1 &
          deps_install_pid=$!
          (
            if command -v pg_dump-17 >/dev/null 2>&1 && command -v pg_restore-17 >/dev/null 2>&1 && command -v psql-17 >/dev/null 2>&1; then
              exit 0
            fi
            sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-prod.sources
            sudo apt-get update
            sudo apt-get install -y ca-certificates postgresql-common
            sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
            sudo apt-get install -y postgresql-client-17
          ) > "${RUNNER_TEMP}/pg17-client-install.log" 2>&1 &
          pg17_install_pid=$!
          bun scripts/supabase-worktree.ts start -x imgproxy,studio,mailpit,realtime,postgres-meta,supavisor,logflare,vector
          if ! wait "${deps_install_pid}"; then
            echo "::error::Dependency install failed"
            cat "${RUNNER_TEMP}/deps-install.log"
            exit 1
          fi
          if ! wait "${pg17_install_pid}"; then
            echo "::error::PostgreSQL 17 client install failed"
            cat "${RUNNER_TEMP}/pg17-client-install.log"
            exit 1
          fi
      - name: Export isolated Supabase endpoints
        run: |
          bun scripts/supabase-worktree.ts with-env bun -e 'const apiUrl = new URL(process.env.SUPABASE_URL ?? ""); const dbUrl = process.env.SUPABASE_DB_URL ?? ""; if (!apiUrl.host || !dbUrl) throw new Error("Isolated Supabase status is missing API_URL or DB_URL."); console.log(`SUPABASE_FUNCTIONS_HEALTH_URL=http-get://${apiUrl.host}/functions/v1/ok`); console.log(`MAIN_SUPABASE_DB_URL=${dbUrl}`)' >> "$GITHUB_ENV"
      - name: Check read-replica schema snapshot
        if: matrix.shard == '1/2'
        env:
          PSQL_BIN: /usr/lib/postgresql/17/bin/psql
          PG_DUMP_BIN: /usr/lib/postgresql/17/bin/pg_dump
          PG_RESTORE_BIN: /usr/lib/postgresql/17/bin/pg_restore
        run: bun run readreplicate:check-schema
      - name: Run Supabase Test DB
        if: matrix.shard == '1/2'
        run: bun scripts/supabase-worktree.ts test db
      - name: Lint SQL
        if: matrix.shard == '1/2'
        run: bun scripts/supabase-worktree.ts db lint -s public --fail-on warning
      - name: Quiesce test scheduler
        run: bun scripts/supabase-worktree.ts with-env bun scripts/quiesce-test-scheduler.ts

      - id: bootstrap_edge_server
        name: Bootstrap Edge server
        env:
          CAPGO_PREVENT_BACKGROUND_FUNCTIONS: 'true'
          BACKGROUND_SERVICE_NAME: Bootstrap Edge server
          BACKGROUND_RUN_COMMAND: exec bun scripts/supabase-worktree.ts functions serve
          BACKGROUND_LOG_PATH: ${{ runner.temp }}/bootstrap-edge-server.log
          BACKGROUND_WAIT_TIMEOUT_MS: 60000
        run: |
          export BACKGROUND_WAIT_ON="${SUPABASE_FUNCTIONS_HEALTH_URL:?Missing isolated Supabase health URL}"
          bash .github/scripts/start-background-service.sh
      - name: Run backend integration tests
        env:
          VITEST_SHARD: ${{ matrix.shard }}
        run: bun run supabase:with-env -- bunx vitest run --exclude=tests/*.unit.test.ts --exclude=tests/cli* --exclude=tests/read-replica-schema-catalog.test.ts $(sed 's|^|--exclude=|' tests/tinbase-db-tests.txt | tr '\n' ' ') --shard="$VITEST_SHARD"
      - name: Run read-replica schema catalog test
        if: matrix.shard == '1/2'
        run: bun run supabase:with-env -- bunx vitest run tests/read-replica-schema-catalog.test.ts --no-file-parallelism --maxWorkers=1
      - name: Show Edge server logs after backend test failure
        if: failure() && steps.bootstrap_edge_server.outputs.log_path != ''
        run: |
          echo "::group::Bootstrap Edge server log"
          tail -n 200 "${{ steps.bootstrap_edge_server.outputs.log_path }}" || true
          echo "::endgroup::"
      - name: Upload background service logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-backend-background-service-logs-${{ strategy.job-index }}
          path: ${{ steps.bootstrap_edge_server.outputs.log_path }}
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop background services
        if: always()
        run: |
          for pid in "${{ steps.bootstrap_edge_server.outputs.pid }}"; do
            if [ -n "${pid}" ] && kill -0 "${pid}" 2>/dev/null; then
              kill "${pid}" 2>/dev/null || true
            fi
          done
          bun scripts/supabase-worktree.ts stop --no-backup || true

  # Removed from CI: local workerd/edge overload produces intermittent 503/429
  # cascades and false-red shards. Keep `bun test:cloudflare:*` for local/manual runs.
  test_cloudflare:
    needs: changes
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Run Cloudflare Workers tests (shard ${{ matrix.shard }})
    permissions:
      contents: read
    concurrency:
      group: capgo-local-services-cloudflare-${{ github.repository }}-${{ matrix.shard }}
      cancel-in-progress: false
    env:
      SUPABASE_WORKTREE_INSTANCE: cloudflare-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.shard }}
      SUPABASE_WORKTREE_PORT_OFFSET: ${{ matrix.supabase_port_offset }}
      CLOUDFLARE_WORKER_PORT_OFFSET: ${{ matrix.cloudflare_worker_port_offset }}
      CLOUDFLARE_PERSIST_DIR: .context/cloudflare-workers-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.supabase_port_offset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1/2
            supabase_port_offset: 4000
            cloudflare_worker_port_offset: 4000
          - shard: 2/2
            supabase_port_offset: 4100
            cloudflare_worker_port_offset: 4100
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
        with:
          fetch-depth: 2
      - name: Setup Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: 24.x
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2 # v2.0.0
        with:
          version: 2.84.2
      - name: Link Supabase templates
        run: ln -sfn supabase/templates templates
      - name: Stop this job's Supabase stack
        run: bun scripts/supabase-worktree.ts stop --no-backup || true
      - name: Run Supabase Start (deps install in background)
        run: |
          (
            set -e
            bun install
          ) > "${RUNNER_TEMP}/deps-install.log" 2>&1 &
          deps_install_pid=$!
          bun scripts/supabase-worktree.ts start -x imgproxy,studio,mailpit,realtime,postgres-meta,supavisor,logflare,vector
          if ! wait "${deps_install_pid}"; then
            echo "::error::Dependency install failed"
            cat "${RUNNER_TEMP}/deps-install.log"
            exit 1
          fi
      - name: Export isolated test endpoints
        run: |
          {
            bun scripts/supabase-worktree.ts with-env bun -e 'const apiUrl = new URL(process.env.SUPABASE_URL ?? ""); const dbUrl = process.env.SUPABASE_DB_URL ?? ""; if (!apiUrl.host || !dbUrl) throw new Error("Isolated Supabase status is missing API_URL or DB_URL."); console.log(`SUPABASE_FUNCTIONS_HEALTH_URL=http-get://${apiUrl.host}/functions/v1/ok`); console.log(`MAIN_SUPABASE_DB_URL=${dbUrl}`)'
            printf 'CLOUDFLARE_FUNCTION_URL=http://127.0.0.1:%s\n' "$((8787 + CLOUDFLARE_WORKER_PORT_OFFSET))"
          } >> "$GITHUB_ENV"
      - name: Quiesce test scheduler
        run: bun scripts/supabase-worktree.ts with-env bun scripts/quiesce-test-scheduler.ts

      - id: bootstrap_edge_server
        name: Bootstrap Edge server
        env:
          BACKGROUND_SERVICE_NAME: Bootstrap Edge server
          BACKGROUND_RUN_COMMAND: exec bun scripts/supabase-worktree.ts functions serve
          BACKGROUND_LOG_PATH: ${{ runner.temp }}/cloudflare-edge-server.log
          BACKGROUND_WAIT_TIMEOUT_MS: 60000
        run: |
          export BACKGROUND_WAIT_ON="${SUPABASE_FUNCTIONS_HEALTH_URL:?Missing isolated Supabase health URL}"
          bash .github/scripts/start-background-service.sh
      - id: start_cloudflare_workers
        name: Start Cloudflare Workers for testing
        env:
          BACKGROUND_SERVICE_NAME: Cloudflare Workers
          BACKGROUND_RUN_COMMAND: |
            chmod +x scripts/start-cloudflare-workers.sh
            exec ./scripts/start-cloudflare-workers.sh
          BACKGROUND_LOG_PATH: ${{ runner.temp }}/cloudflare-workers.log
          BACKGROUND_WAIT_TIMEOUT_MS: 120000
          BACKGROUND_TAIL_LINES: 400
        run: |
          worker_port_offset="${CLOUDFLARE_WORKER_PORT_OFFSET:-0}"
          export BACKGROUND_WAIT_ON="http-get://127.0.0.1:$((8787 + worker_port_offset))/ok
          http-get://127.0.0.1:$((8788 + worker_port_offset))/ok
          http-get://127.0.0.1:$((8789 + worker_port_offset))/ok"
          bash .github/scripts/start-background-service.sh
      - name: Run Cloudflare Workers integration tests
        env:
          VITEST_SHARD: ${{ matrix.shard }}
        run: bun run supabase:with-env -- bunx vitest run --exclude=tests/cli* --exclude=tests/*.unit.test.ts $(sed 's|^|--exclude=|' tests/tinbase-db-tests.txt | tr '\n' ' ') --config vitest.config.cloudflare.ts --shard="$VITEST_SHARD"
      - name: Show Cloudflare Worker logs after Cloudflare test failure
        if: failure() && steps.start_cloudflare_workers.outputs.log_path != ''
        run: |
          echo "::group::Cloudflare Worker log"
          tail -n 400 "${{ steps.start_cloudflare_workers.outputs.log_path }}" || true
          echo "::endgroup::"
      - name: Upload background service logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-cloudflare-background-service-logs-${{ strategy.job-index }}
          path: |
            ${{ steps.bootstrap_edge_server.outputs.log_path }}
            ${{ steps.start_cloudflare_workers.outputs.log_path }}
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop background services
        if: always()
        run: |
          for pid in "${{ steps.bootstrap_edge_server.outputs.pid }}" "${{ steps.start_cloudflare_workers.outputs.pid }}"; do
            if [ -n "${pid}" ] && kill -0 "${pid}" 2>/dev/null; then
              kill "${pid}" 2>/dev/null || true
            fi
          done
          bun scripts/supabase-worktree.ts stop --no-backup || true

  # Removed from CI: Supabase edge 503s break SSO domain-check during login
  # (password step never appears). Frontend coverage stays in unit/backend tests.
  test_playwright:
    needs: changes
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Run Playwright tests
    permissions:
      contents: read
    concurrency:
      group: capgo-local-services-playwright-${{ github.repository }}
      cancel-in-progress: false
    env:
      SUPABASE_WORKTREE_INSTANCE: playwright-${{ github.run_id }}-${{ github.run_attempt }}
      SUPABASE_WORKTREE_PORT_OFFSET: 5000
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Cache Deno dependencies
        uses: actions/cache@v5 # v5
        with:
          path: ${{ env.DENO_DIR }}
          key: my_cache_key
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
        with:
          fetch-depth: 2
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install dependencies
        run: bun install
      - name: Disable flaky runner apt sources
        run: sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-prod.sources
      - id: playwright_version
        name: Resolve Playwright version
        run: echo "version=$(bun -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"
      # Key on the Playwright version, not the lockfile: bun.lock churns on every
      # release bump, which made this cache miss (and re-download ~50s of browsers)
      # on nearly every run. Browsers only change when the Playwright version does.
      - name: Cache Playwright browsers
        id: playwright_browser_cache
        uses: actions/cache@v5 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright_version.outputs.version }}
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2 # v2.0.0
        with:
          version: 2.84.2
      - name: Link Supabase templates
        run: ln -sfn supabase/templates templates
      - id: start_playwright_services
        name: Start Playwright services in background
        run: |
          mkdir -p .context/playwright
          rm -f .context/playwright/gha-backend.ready
          nohup bash -c 'STRIPE_EMULATOR_PORT=4510 bun run stripe:emulator' \
            > "${RUNNER_TEMP}/playwright-stripe-emulator.log" 2>&1 &
          echo "stripe_pid=$!" >> "$GITHUB_OUTPUT"
          # Fresh CI runner: supabase start applies migrations + seed, so skip the redundant db reset.
          nohup bash -c 'PLAYWRIGHT_READY_FILE=.context/playwright/gha-backend.ready \
            SKIP_SUPABASE_DB_RESET=true \
            ENV=local \
            STRIPE_SECRET_KEY=sk_test_emulator \
            STRIPE_API_BASE_URL=http://host.docker.internal:4510 \
            STRIPE_WEBHOOK_SECRET=testsecret \
            WEBAPP_URL=http://localhost:5173 \
            bun run backend:playwright' \
            > "${RUNNER_TEMP}/playwright-backend.log" 2>&1 &
          echo "backend_pid=$!" >> "$GITHUB_OUTPUT"
          # The backend boots Supabase via the worktree wrapper (hash-derived ports). Plain status
          # flips to exit-0 before API_URL is populated, so probe with-env itself: only start the
          # build once the exact mechanism the real command uses can resolve the Supabase env.
          nohup bash -c 'echo "waiting for supabase env via with-env..."
            until bun run supabase:with-env -- bun -e "process.exit(process.env.SUPABASE_URL && process.env.SUPABASE_ANON_KEY ? 0 : 1)" >/dev/null 2>&1; do sleep 2; done
            echo "supabase env ready, building frontend"
            bun run supabase:with-env -- bun scripts/playwright-frontend-preview.ts' \
            > "${RUNNER_TEMP}/playwright-frontend.log" 2>&1 &
          echo "frontend_pid=$!" >> "$GITHUB_OUTPUT"
      # On cache hit nothing is installed: ubuntu-latest already ships Chromium's
      # system libraries, so install-deps was ~28s of apt for packages already present.
      - name: Install Playwright browser
        if: steps.playwright_browser_cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium
      - name: Wait for Playwright services
        run: |
          bunx wait-on@8.0.1 \
            tcp:127.0.0.1:4510 \
            "file:${{ github.workspace }}/.context/playwright/gha-backend.ready" \
            http-get://localhost:5173 \
            --timeout 360000 --interval 500 --log
      - name: Run Playwright tests
        env:
          SKIP_STRIPE_EMULATOR_START: 'true'
          SKIP_BACKEND_START: 'true'
          SKIP_FRONTEND_START: 'true'
        run: bunx playwright test
      - name: Show Playwright service logs after failure
        if: failure()
        run: |
          echo "::group::Stripe emulator log"
          tail -n 200 "${RUNNER_TEMP}/playwright-stripe-emulator.log" || true
          echo "::endgroup::"
          echo "::group::Playwright backend log"
          tail -n 300 "${RUNNER_TEMP}/playwright-backend.log" || true
          echo "::endgroup::"
          echo "::group::Playwright frontend log"
          tail -n 200 "${RUNNER_TEMP}/playwright-frontend.log" || true
          echo "::endgroup::"
      - name: Upload Playwright background service logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-background-service-logs
          path: |
            ${{ runner.temp }}/playwright-stripe-emulator.log
            ${{ runner.temp }}/playwright-backend.log
            ${{ runner.temp }}/playwright-frontend.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v6 # v6
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop Playwright background services
        if: always()
        run: |
          for pid in "${{ steps.start_playwright_services.outputs.frontend_pid }}" "${{ steps.start_playwright_services.outputs.backend_pid }}" "${{ steps.start_playwright_services.outputs.stripe_pid }}"; do
            if [ -n "${pid}" ] && kill -0 "${pid}" 2>/dev/null; then
              kill "${pid}" 2>/dev/null || true
            fi
          done
          bun scripts/supabase-worktree.ts stop --no-backup || true

  cli_node_compatibility:
    needs: changes
    if: needs.changes.outputs.run_cli == 'true'
    name: CLI on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6 # v6
        with:
          node-version: 24.x
      - name: Display Node.js version
        run: node --version
      - name: Install dependencies
        run: bun install
      - name: Build CLI
        run: bun run cli:build
      - name: Test CLI --version
        run: node cli/dist/index.js --version
      - name: Test CLI --help
        run: node cli/dist/index.js --help

  cli_typos:
    needs: changes
    if: needs.changes.outputs.run_cli == 'true'
    name: Check for typos (CLI)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Check spelling with typos
        uses: crate-ci/typos@v1 # v1.45.1
        with:
          files: ./cli
          config: ./.typos.toml

  cli_create_valid_zip_linux:
    needs: changes
    if: needs.changes.outputs.run_cli == 'true'
    name: CLI create valid zip (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install dependencies
        run: bun install
      - name: Install test_upload dependencies
        run: bun install --cwd cli/test/test_upload
      - name: Build CLI
        run: bun run cli:build
      - name: Create a valid zip test
        run: node ./cli/dist/index.js bundle zip --path cli/test/test_upload -n build-linux.zip --package-json cli/test/test_upload/package.json
      - name: Check build directory contents
        run: ls -R ./cli/dist
      - name: Check ZIP file contents
        run: unzip -l build-linux.zip
      - name: Upload build-linux.zip artifact
        uses: actions/upload-artifact@v4 # v4
        with:
          name: build-zip-linux
          path: build-linux.zip

  cli_check_posix_paths_windows:
    needs: changes
    if: needs.changes.outputs.run_cli == 'true'
    name: CLI POSIX paths (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [windows-2025, windows-2022]
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Setup bun
        if: runner.os != 'Windows'
        run: bash scripts/setup-bun.sh
      - name: Setup bun on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup-bun.ps1
      - name: Install dependencies
        run: bun install
      - name: Install test_upload dependencies
        run: bun install --cwd cli/test/test_upload
      - name: Build CLI
        run: bun run cli:build
      - name: Create a zip test
        run: node ./cli/dist/index.js bundle zip --path cli/test/test_upload -n build-${{ matrix.os }}.zip --package-json cli/test/test_upload/package.json
      - name: Upload build.zip artifact
        uses: actions/upload-artifact@v4 # v4
        with:
          name: build-zip-${{ matrix.os }}
          path: build-${{ matrix.os }}.zip

  cli_check_posix_paths_unix:
    needs: [changes, cli_create_valid_zip_linux, cli_check_posix_paths_windows]
    if: needs.changes.outputs.run_cli == 'true'
    name: CLI POSIX paths (Unix)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Download build-linux.zip artifact
        uses: actions/download-artifact@v4 # v4
        with:
          name: build-zip-linux
      - name: List files
        run: ls -lh
      - name: Check file size of Linux build
        run: ls -lh build-linux.zip
      - name: Verify ZIP file integrity for Linux build with zipinfo
        run: |
          zipinfo ./build-linux.zip || (echo "ZIP file is corrupted: build-linux.zip" && exit 1)
      - name: Verify POSIX paths for Linux build
        run: |
          unzip build-linux.zip -d extracted-linux
          if find extracted-linux -type f | grep -qE '\\\\'; then
            echo "Non-POSIX paths detected in build-linux.zip."
            exit 1
          else
            echo "All paths are POSIX compliant in build-linux.zip."
          fi
      - name: Setup Java
        uses: actions/setup-java@v5 # v5
        with:
          distribution: zulu
          java-version: '17'
      - name: Compile VerifyZip.java
        run: javac ./cli/test/VerifyZip.java
      - name: Verify ZIP file integrity for Linux build with Java
        run: java -cp ./cli/test VerifyZip build-linux.zip
      - name: Download build-windows-2025.zip artifact
        uses: actions/download-artifact@v4 # v4
        with:
          name: build-zip-windows-2025
      - name: Download build-windows-2022.zip artifact
        uses: actions/download-artifact@v4 # v4
        with:
          name: build-zip-windows-2022
      - name: Check file sizes of Windows builds
        run: |
          ls -lh build-windows-2025.zip
          ls -lh build-windows-2022.zip
      - name: Verify ZIP file integrity for Windows 2025 build with zipinfo
        run: |
          zipinfo ./build-windows-2025.zip || (echo "ZIP file is corrupted: build-windows-2025.zip" && exit 1)
      - name: Verify ZIP file integrity for Windows 2022 build with zipinfo
        run: |
          zipinfo ./build-windows-2022.zip || (echo "ZIP file is corrupted: build-windows-2022.zip" && exit 1)
      - name: Verify POSIX paths for Windows 2025 build
        run: |
          unzip build-windows-2025.zip -d extracted-2025
          if find extracted-2025 -type f | grep -qE '\\\\'; then
            echo "Non-POSIX paths detected in build-windows-2025.zip."
            exit 1
          else
            echo "All paths are POSIX compliant in build-windows-2025.zip."
          fi
      - name: Verify POSIX paths for Windows 2022 build
        run: |
          unzip build-windows-2022.zip -d extracted-2022
          if find extracted-2022 -type f | grep -qE '\\\\'; then
            echo "Non-POSIX paths detected in build-windows-2022.zip."
            exit 1
          else
            echo "All paths are POSIX compliant in build-windows-2022.zip."
          fi
      - name: Verify ZIP file integrity for Windows 2025 build with Java
        run: java -cp ./cli/test VerifyZip build-windows-2025.zip
      - name: Verify ZIP file integrity for Windows 2022 build with Java
        run: java -cp ./cli/test VerifyZip build-windows-2022.zip

  cli_check_posix_paths_macos:
    needs: [changes, cli_create_valid_zip_linux, cli_check_posix_paths_windows]
    if: needs.changes.outputs.run_cli == 'true'
    name: CLI POSIX paths (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Download build-linux.zip artifact
        uses: actions/download-artifact@v4 # v4
        with:
          name: build-zip-linux
      - name: Download build-windows-2025.zip artifact
        uses: actions/download-artifact@v4 # v4
        with:
          name: build-zip-windows-2025
      - name: Download build-windows-2022.zip artifact
        uses: actions/download-artifact@v4 # v4
        with:
          name: build-zip-windows-2022
      - name: List files
        run: ls -lh
      - name: Check file size of Linux build
        run: ls -lh build-linux.zip
      - name: Setup Swift
        uses: swift-actions/setup-swift@v3 # v3
      - name: Get swift version
        run: swift --version
      - name: Compile test executable
        run: swift build -c release
        working-directory: ./cli/test/test_zip_swift
      - name: Run the swift test
        run: ./cli/test/test_zip_swift/.build/release/MyCLI --zip-files build-linux.zip build-windows-2025.zip build-windows-2022.zip

  cli_posix_paths_final:
    needs: [changes, cli_check_posix_paths_unix, cli_check_posix_paths_macos]
    if: needs.changes.outputs.run_cli == 'true'
    name: CLI POSIX paths final
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Final check
        run: echo "All POSIX path checks completed successfully"

  cli_tests:
    needs: changes
    if: needs.changes.outputs.run_cli == 'true'
    runs-on: ubuntu-latest
    name: Run CLI tests
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Setup Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: 24.x
      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # v4
        with:
          version: latest
      - name: Install dependencies
        run: bun install
      - name: Lint CLI
        run: bun run cli:lint
      - name: Typecheck CLI
        run: bun run cli:typecheck
      - name: Build CLI
        run: bun run cli:build
      - name: Quick ESM SDK check
        run: bun run --cwd cli test:esm-sdk
      - name: Run CLI help
        run: node cli/dist/index.js --help
      - name: Setup test fixtures for version detection
        run: ./cli/test/fixtures/setup-test-projects.sh
      - name: Run CLI validation tests
        run: bun run cli:test

  cli_capgo_integration:
    needs: changes
    # CLI integration tests exercise the backend edge functions, so backend-only
    # changes must run them too (they are excluded from the backend shards).
    if: needs.changes.outputs.run_cli == 'true' || needs.changes.outputs.run_capgo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Run Capgo CLI integration tests
    permissions:
      contents: read
      actions: write
    concurrency:
      group: capgo-local-services-cli-${{ github.repository }}
      cancel-in-progress: false
    env:
      SUPABASE_WORKTREE_INSTANCE: cli-${{ github.run_id }}-${{ github.run_attempt }}
      SUPABASE_WORKTREE_PORT_OFFSET: 6000
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Cache Deno dependencies
        uses: actions/cache@v5 # v5
        with:
          path: ${{ env.DENO_DIR }}
          key: my_cache_key
      - name: Checkout repository
        uses: actions/checkout@v6 # v6
        with:
          fetch-depth: 2
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2 # v2.0.0
        with:
          version: 2.84.2
      - name: Link Supabase templates
        run: ln -sfn supabase/templates templates
      - name: Stop this job's Supabase stack
        run: bun scripts/supabase-worktree.ts stop --no-backup || true
      - name: Run Supabase Start (deps install in background)
        run: |
          (
            set -e
            bun install
            bun run cli:build
          ) > "${RUNNER_TEMP}/deps-install.log" 2>&1 &
          deps_install_pid=$!
          bun scripts/supabase-worktree.ts start -x imgproxy,studio,mailpit,realtime,postgres-meta,supavisor,logflare,vector
          if ! wait "${deps_install_pid}"; then
            echo "::error::Dependency install or CLI build failed"
            cat "${RUNNER_TEMP}/deps-install.log"
            exit 1
          fi
      - name: Export isolated Supabase endpoints
        run: |
          bun scripts/supabase-worktree.ts with-env bun -e 'const apiUrl = new URL(process.env.SUPABASE_URL ?? ""); const dbUrl = process.env.SUPABASE_DB_URL ?? ""; if (!apiUrl.host || !dbUrl) throw new Error("Isolated Supabase status is missing API_URL or DB_URL."); console.log(`SUPABASE_FUNCTIONS_HEALTH_URL=http-get://${apiUrl.host}/functions/v1/ok`); console.log(`MAIN_SUPABASE_DB_URL=${dbUrl}`)' >> "$GITHUB_ENV"
      - id: bootstrap_cli_edge_server
        name: Bootstrap Edge server
        env:
          BACKGROUND_SERVICE_NAME: Bootstrap Edge server
          BACKGROUND_RUN_COMMAND: exec bun scripts/supabase-worktree.ts functions serve
          BACKGROUND_LOG_PATH: ${{ runner.temp }}/bootstrap-cli-edge-server.log
          BACKGROUND_WAIT_TIMEOUT_MS: 60000
        run: |
          export BACKGROUND_WAIT_ON="${SUPABASE_FUNCTIONS_HEALTH_URL:?Missing isolated Supabase health URL}"
          bash .github/scripts/start-background-service.sh
      - name: Run Capgo CLI integration tests
        run: |
          bun run supabase:with-env -- bunx vitest run tests/cli* --exclude=tests/cli-min-version.test.ts --exclude=tests/cli-new-encryption.test.ts
          bun run supabase:with-env -- bunx vitest run tests/cli-min-version.test.ts --no-file-parallelism --maxWorkers=1
          bun run supabase:with-env -- bunx vitest run tests/cli-new-encryption.test.ts --no-file-parallelism --maxWorkers=1
      - name: Show CLI Edge server logs after failure
        if: failure() && steps.bootstrap_cli_edge_server.outputs.log_path != ''
        run: |
          echo "::group::CLI Bootstrap Edge server log"
          tail -n 200 "${{ steps.bootstrap_cli_edge_server.outputs.log_path }}" || true
          echo "::endgroup::"
      - name: Upload CLI background service logs
        if: failure() && steps.bootstrap_cli_edge_server.outputs.log_path != ''
        uses: actions/upload-artifact@v6 # v6
        with:
          name: cli-background-service-logs
          path: ${{ steps.bootstrap_cli_edge_server.outputs.log_path }}
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop CLI background services
        if: always()
        run: |
          for pid in "${{ steps.bootstrap_cli_edge_server.outputs.pid }}"; do
            if [ -n "${pid}" ] && kill -0 "${pid}" 2>/dev/null; then
              kill "${pid}" 2>/dev/null || true
            fi
          done
          bun scripts/supabase-worktree.ts stop --no-backup || true

name: Run tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_call: # Allow this workflow to be called by other workflows

permissions: {}

env:
  DENO_DIR: my_cache_directory
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test_all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Run tests
    permissions:
      contents: read
      actions: write
    steps:
      - name: Cache Deno dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.DENO_DIR }}
          key: my_cache_key
      - name: Checkout capgo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
      - name: Setup bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Validate migration timestamps
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          extract_timestamp() {
            local file_name="$1"
            local base_name
            base_name="$(basename "$file_name")"

            if [[ "$base_name" =~ ^([0-9]{14})_ ]]; then
              echo "${BASH_REMATCH[1]}"
            else
              return 1
            fi
          }

          BASE_REF="HEAD^1"

          declare -A base_timestamp_to_file
          while IFS= read -r file; do
            ts="$(extract_timestamp "$file" || true)"
            [ -z "$ts" ] && continue
            base_timestamp_to_file["$ts"]="$file"
          done < <(git ls-tree -r --name-only "$BASE_REF" -- 'supabase/migrations/*.sql')

          latest_base_timestamp="00000000000000"
          for ts in "${!base_timestamp_to_file[@]}"; do
            if [[ "$ts" > "$latest_base_timestamp" ]]; then
              latest_base_timestamp="$ts"
            fi
          done

          added_files="$(git diff --name-only --diff-filter=A "${BASE_REF}" HEAD -- 'supabase/migrations/*.sql')"
          duplicate_timestamps=0

          if [ -n "$added_files" ]; then
            declare -A added_timestamp_count
            declare -A added_timestamp_files

            while IFS= read -r file; do
              [ -z "$file" ] && continue
              ts="$(extract_timestamp "$file" || true)"
              [ -z "$ts" ] && continue

              if [[ -n "${base_timestamp_to_file["$ts"]+x}" ]]; then
                echo "❌ Duplicate migration timestamp: ${ts}"
                echo "  PR file: $file"
                echo "  Existing file on main: ${base_timestamp_to_file["$ts"]}"
                duplicate_timestamps=1
              fi

              if [ -n "${added_timestamp_count["$ts"]+x}" ]; then
                echo "❌ Duplicate migration timestamp in PR: ${ts}"
                echo "  Previous file: ${added_timestamp_files["$ts"]}"
                echo "  Additional file: ${file}"
                duplicate_timestamps=1
              else
                added_timestamp_count["$ts"]=1
                added_timestamp_files["$ts"]="$file"
              fi

              if [[ "$ts" < "$latest_base_timestamp" ]]; then
                echo "❌ Migration timestamp regression detected"
                echo "  Last migration timestamp on main: ${latest_base_timestamp}"
                echo "  New migration file: $file"
                echo "  New migration timestamp: ${ts}"
                duplicate_timestamps=1
              fi
            done <<< "$added_files"
          fi

          if [ "$duplicate_timestamps" -ne 0 ]; then
            exit 1
          fi

          echo "✅ Migration filename timestamps are unique and strictly newer than main."
      - name: Check for typos
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1
      - name: Show bun version
        run: bun --version
      - name: Show capgo version
        run: bunx @capgo/cli@latest -v
      - name: Check for console statements
        run: |
          if grep -r --exclude="logging.ts" --exclude=".env" --exclude=".env.*" "console\." supabase/functions/; then
            echo "❌ Found console statements in supabase/functions directory, use cloudlog instead"
            exit 1
          else
            echo "✅ No console statements found in supabase/functions directory"
          fi
      - name: Install dependencies
        run: bun install
      # - name: Install playwright
      #   run: bunx playwright install
      - name: Lint
        run: bun lint && bun lint:backend
      - name: Typecheck
        run: bun typecheck
      # TODO: enable I18n linting when the issue they have with npm not found is fixed
      # - name: Lint I18n
      #   run: bunx @inlang/cli lint --project project.inlang
      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          # Supabase CLI 2.90.0 regressed our local test-db startup on GitHub
          # Actions runners; pin to the last known-good version until upstream is
          # stable again.
          version: 2.84.2
      - name: Show Supabase CLI version
        run: supabase --version
      - name: Link Supabase templates
        run: ln -sfn supabase/templates templates
      - name: Run Supabase Start
        run: supabase start -x imgproxy,studio,mailpit,realtime,postgres-meta,supavisor,studio,logflare,vector,realtime
      - name: Run Supabase Test DB
        run: supabase test db
      - name: Lint SQL
        run: supabase db lint -s public --fail-on warning
      - uses: JarvusInnovations/background-action@2428e7b970a846423095c79d43f759abf979a635 # v1
        name: Bootstrap Edge server
        with:
          run: supabase functions serve &
          wait-on: |
            http-get://127.0.0.1:54321/functions/v1/ok
          # IMPORTANT: to use environment variables in wait-on, you must use this form: ${{ env.VAR }}
          # See wait-on section below for all resource types and prefixes

          tail: stderr,stdout # true = stderr,stdout
          # This will allow you to monitor the progress live

          log-output-resume: stderr,stdout
          # Eliminates previously output stderr log entries from post-run output

          wait-for: 1m

          log-output: stderr,stdout # same as true

          log-output-if: true
          # failure = exit-early or timeout

          working-directory: .
      - name: Run all backend and CLI tests
        run: bun run test:all
      - uses: JarvusInnovations/background-action@2428e7b970a846423095c79d43f759abf979a635 # v1
        name: Start Cloudflare Workers for testing
        with:
          run: |
            chmod +x scripts/start-cloudflare-workers.sh
            ./scripts/start-cloudflare-workers.sh
          wait-on: |
            http-get://127.0.0.1:8787/ok
            http-get://127.0.0.1:8788/ok
            http-get://127.0.0.1:8789/ok
          tail: stderr,stdout
          log-output-resume: stderr,stdout
          wait-for: 2m
          log-output: stderr,stdout
          log-output-if: true
          working-directory: .
      - name: Run Cloudflare Workers backend tests
        run: bun run test:cloudflare:backend

  test_playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Run Playwright tests
    permissions:
      contents: read
    steps:
      - name: Cache Deno dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.DENO_DIR }}
          key: my_cache_key
      - name: Checkout capgo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
      - name: Setup bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: 2.84.2
      - name: Link Supabase templates
        run: ln -sfn supabase/templates templates
      - name: Run Playwright tests
        run: bun run test:front
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

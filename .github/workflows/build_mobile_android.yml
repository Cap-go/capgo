name: Build mobile android

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.0.0)"
        required: true

permissions: {}

jobs:
  build_android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}
      - name: Validate tag
        run: |
          git fetch --all --tags
          if ! git tag -l | grep -q "^${{ github.event.inputs.tag }}$"; then
            echo "Error: Tag ${{ github.event.inputs.tag }} does not exist."
            exit 1
          fi
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        # Force bun's hoisted (flat) node_modules layout. The monorepo defaults to
        # bun's isolated linker (node_modules/.bun/<pkg>@<ver>+<peerHash> + symlinks),
        # which Capacitor's Gradle subprojects can't resolve (../node_modules/@capacitor/
        # <plugin>/android), producing "No variants exist". Hoisted lays real folders.
        run: bun install --frozen-lockfile --linker=hoisted
      - name: Prepare mobile project
        # Use `cap sync android` instead of build:mobile's `cap copy`. `cap copy`
        # only pushes web assets + config; `cap sync` also runs `cap update`, which
        # regenerates the cordova plugins subproject including
        # android/capacitor-cordova-android-plugins/cordova.variables.gradle.
        # That dir is gitignored, so the remote builder never receives it unless we
        # regenerate it here before `capgo build request` uploads the workspace.
        run: |
          bun run build
          bunx cap sync android
      - name: Request Android build through Capgo CLI
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          PLAY_CONFIG_JSON: ${{ secrets.PLAY_CONFIG_JSON }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          BUILD_OUTPUT_UPLOAD_ENABLED: "true"
          BUILD_OUTPUT_RETENTION_SECONDS: "604800"
        run: bunx @capgo/cli@latest build request --platform android --path . --ai-analytics

name: Build and publish CLI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "cli-[0-9]*"

permissions: {}

jobs:
  publish_cli:
    runs-on: ubuntu-latest
    name: Build and publish CLI to npm
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Setup bun
        run: bash scripts/setup-bun.sh
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build CLI
        run: bun run cli:build
      - name: Assert dev-only env override is stripped from release bundle
        run: |
          test -f cli/dist/index.js || {
            echo "::error::cli/dist/index.js not found; build output path changed or build failed"
            exit 1
          }
          if grep -q "CAPGO_KEYCHAIN_HELPER_PATH" cli/dist/index.js; then
            echo "::error::CAPGO_KEYCHAIN_HELPER_PATH leaked into the release bundle — dead-code elimination failed"
            exit 1
          fi
      - name: Resolve previous successful CLI release
        id: changelog_base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName,isDraft | jq -r --arg current "$GITHUB_REF_NAME" --arg prefix "cli-" '[.[] | select(.isDraft == false and .tagName != $current and (.tagName | startswith($prefix)))] | first | .tagName // empty')
          if [ -z "$previous_tag" ]; then
            echo "::error::No previous successful CLI release found"
            exit 1
          fi
          echo "from_tag=$previous_tag" >> "$GITHUB_OUTPUT"
      - name: Generate AI changelog
        id: changelog
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FROM_TAG: ${{ steps.changelog_base.outputs.from_tag }}
        run: bun run changelog:ai
      - name: Publish CLI to npm
        if: ${{ !contains(github.ref, '-alpha.') }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --cwd cli --access public
      - name: Publish CLI to npm with next tag
        if: ${{ contains(github.ref, '-alpha.') }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --cwd cli --tag next --access public
      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 🆕 Changelog

            ${{ steps.changelog.outputs.result || '_Changelog was not generated automatically for this release._' }}

            ---

            🔗 **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.changelog_base.outputs.from_tag }}...${{ github.ref_name }}
          make_latest: false
          token: "${{ secrets.PERSONAL_ACCESS_TOKEN }}"
          prerelease: ${{ contains(github.ref, '-alpha.') }}

name: Build and prerelease ASC key helper

# Builds the App Store Connect key helper (cli/native/asc-key-helper) as a
# UNIVERSAL .app, Developer ID signs + notarizes + staples it, and attaches the
# zipped bundle to a GitHub (pre)release so it can be downloaded and tested via
#   CAPGO_ASC_KEY_HELPER_PATH=…/CapgoAscKeyHelper.app/Contents/MacOS/CapgoAscKeyHelper
# This does NOT publish to npm — the auto-resolving npm distribution is a later
# step. Reuses the same Apple signing/notarization secrets as the keychain helper.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Helper version, e.g. 1.1.0-rc.1 (a '-…' suffix marks it a prerelease)"
        required: true
  push:
    tags:
      - "asc-key-helper-[0-9]*"

permissions: {}

jobs:
  publish_asc_key_helper:
    runs-on: macos-latest
    name: Build, sign, notarize, prerelease ASC key helper
    timeout-minutes: 45
    permissions:
      contents: write # create the asc-key-helper-<version> tag + release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Resolve + validate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#asc-key-helper-}"
          fi
          if ! echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::version '$v' is not semver (e.g. 1.1.0-rc.1)"; exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          # Anything with a pre-release suffix (e.g. -rc.1) is a GitHub prerelease.
          if printf '%s' "$v" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build universal .app bundle
        run: bash cli/scripts/package-asc-key-helper-app.sh "${{ steps.version.outputs.version }}"
      - name: Import Developer ID certificate into throwaway keychain
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in imported cert"
            exit 1
          fi
          echo "DEVELOPER_ID_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
      - name: Write App Store Connect API key
        env:
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
        run: |
          # APPLE_KEY_CONTENT is stored base64-encoded (Capgo CLI convention); also
          # accept raw PEM, then validate so notarytool doesn't fail opaquely.
          if printf '%s' "$APPLE_KEY_CONTENT" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "$APPLE_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          else
            printf '%s' "$APPLE_KEY_CONTENT" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          fi
          openssl pkey -in "$RUNNER_TEMP/AuthKey.p8" -noout 2>/dev/null \
            || { echo "::error::APPLE_KEY_CONTENT does not decode to a valid .p8 (tried raw PEM and base64)"; exit 1; }
          echo "APPLE_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: Sign, notarize, staple
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="cli/dist-helper/CapgoAscKeyHelper.app"
          ENTITLEMENTS="cli/native/asc-key-helper/assets/entitlements.plist"
          echo "── Signing $APP (Developer ID + hardened runtime)"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --identifier "app.capgo.asc-key-helper" \
            --sign "$DEVELOPER_ID_IDENTITY" "$APP"
          echo "── Notarizing $APP"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/CapgoAscKeyHelper.zip"
          out=$(xcrun notarytool submit "$RUNNER_TEMP/CapgoAscKeyHelper.zip" \
            --key "$APPLE_KEY_PATH" --key-id "$APPLE_KEY_ID" --issuer "$APPLE_ISSUER_ID" \
            --wait --timeout 30m --output-format json) || true
          id=$(echo "$out" | jq -r '.id // empty')
          status=$(echo "$out" | jq -r '.status // empty')
          if [ "$status" != "Accepted" ]; then
            echo "::error::Notarization failed (status: ${status:-unknown})"
            [ -n "$id" ] && xcrun notarytool log "$id" \
              --key "$APPLE_KEY_PATH" --key-id "$APPLE_KEY_ID" --issuer "$APPLE_ISSUER_ID" || true
            exit 1
          fi
          echo "── Accepted ($id); stapling + verifying"
          xcrun stapler staple "$APP"
          codesign --verify --strict --deep "$APP"
          spctl -a -t exec -vv "$APP"
      - name: Zip notarized bundle
        run: |
          ditto -c -k --keepParent cli/dist-helper/CapgoAscKeyHelper.app \
            "cli/dist-helper/CapgoAscKeyHelper-${{ steps.version.outputs.version }}.zip"
      # Create as a DRAFT first: this repo has immutable releases, which reject
      # asset uploads AFTER a release is published. A draft is mutable, so the
      # asset attaches here; the next step publishes the draft (assets and all).
      - name: Create draft release with notarized asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: asc-key-helper-${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: ASC key helper ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          draft: true
          make_latest: false
          files: cli/dist-helper/CapgoAscKeyHelper-${{ steps.version.outputs.version }}.zip
          body: |
            Signed + notarized macOS build of the App Store Connect key helper.

            **Test it:** download + unzip, then point the CLI at it:
            ```
            CAPGO_ASC_KEY_HELPER_PATH="/path/to/CapgoAscKeyHelper.app/Contents/MacOS/CapgoAscKeyHelper" \
              npx @capgo/cli@latest build init
            ```
          # Built-in token (not a PAT): a GITHUB_TOKEN-created tag does not
          # re-trigger this workflow's push:tags trigger, avoiding a publish loop.
          token: "${{ github.token }}"
      - name: Publish the draft (assets already attached)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "asc-key-helper-${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" --draft=false

# Requires repo secret GH_TOKEN_READ_BUILDER with read access to Cap-go/capgo_builder contents.
name: Check AI prompt sync

on:
  pull_request:
    paths:
      - 'cli/src/ai/prompt.ts'
      - '.github/workflows/check-ai-prompt-sync.yml'
  push:
    branches: [main]
    paths:
      - 'cli/src/ai/prompt.ts'

jobs:
  check-prompt-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch capgo_builder prompt and diff
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_READ_BUILDER }}
        run: |
          set -euo pipefail
          gh api repos/Cap-go/capgo_builder/contents/src/ai-analyze-prompt.ts \
            --jq .content | base64 -d > /tmp/worker-prompt.ts

          tail -n +4 /tmp/worker-prompt.ts > /tmp/worker-prompt-body.txt
          tail -n +4 cli/src/ai/prompt.ts > /tmp/cli-prompt-body.txt

          if ! diff -u /tmp/cli-prompt-body.txt /tmp/worker-prompt-body.txt; then
            echo "::error::AI prompt drift detected between capgo/cli and capgo_builder!"
            echo "Update capgo/cli/src/ai/prompt.ts and capgo_builder/src/ai-analyze-prompt.ts to match."
            exit 1
          fi
          echo "AI prompts are byte-identical."

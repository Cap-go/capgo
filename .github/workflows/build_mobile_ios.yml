name: Build mobile ios

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.0.0)"
        required: true

permissions: {}

jobs:
  build_ios:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}
      - name: Validate tag
        run: |
          git fetch --all --tags
          if ! git tag -l | grep -q "^${{ github.event.inputs.tag }}$"; then
            echo "Error: Tag ${{ github.event.inputs.tag }} does not exist."
            exit 1
          fi
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        # Force bun's hoisted (flat) node_modules layout. Capacitor's native iOS
        # tooling hardcodes flat paths like ../node_modules/@capacitor/<plugin>,
        # which break under bun's default isolated linker (symlinks into a
        # node_modules/.bun/<pkg>@<ver>+<peerHash> store that can dangle on hash
        # drift). Hoisted lays real folders at node_modules/@capacitor/<plugin>.
        run: bun install --frozen-lockfile --linker=hoisted
      - name: Prepare mobile project
        # Use `cap sync ios` instead of build:mobile's `cap copy`. `cap copy`
        # only pushes web assets + config; `cap sync` also regenerates the
        # native SwiftPM project files so the remote builder does not consume
        # stale Package.resolved/CapApp-SPM state from the repository.
        run: |
          bun run build
          bunx cap sync ios
      - name: Request iOS build through Capgo CLI
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CAPGO_IOS_PROVISIONING_MAP_BASE64: ${{ secrets.CAPGO_IOS_PROVISIONING_MAP_BASE64 }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_OUTPUT_UPLOAD_ENABLED: "true"
          BUILD_OUTPUT_RETENTION_SECONDS: "604800"
        run: bunx @capgo/cli@latest build request --platform ios --path . --ai-analytics

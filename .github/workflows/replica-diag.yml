name: Replica diag (temp)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: google-github-actions/setup-gcloud@v2
      - name: Activate SA and inspect Cloud SQL
        env:
          GOOGLE_SERVICE_ACCOUNT_BASE64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          set -uo pipefail
          credentials_file="$(mktemp)"
          trap 'rm -f "$credentials_file"' EXIT
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_BASE64" | base64 --decode > "$credentials_file"
          gcloud auth activate-service-account --key-file="$credentials_file"
          gcloud config set project capgo-394818

          echo "==== instance ===="
          gcloud sql instances describe eu-2 --format='yaml(name,state,settings.activationPolicy,currentDiskSize,settings.dataDiskSizeGb)' || true

          echo "==== operations last 30 ===="
          gcloud sql operations list --instance=eu-2 --limit=30 --format='table(name,operationType,status,user,insertTime,endTime,error.errors[].message)' || true

          echo "==== logging (may be denied) ===="
          gcloud logging read \
            'resource.type="cloudsql_database" AND resource.labels.database_id="capgo-394818:eu-2"' \
            --limit=50 \
            --freshness=12h \
            --format='value(timestamp,textPayload,jsonPayload.message)' || true

          echo "==== pg_stat_subscription ===="
          gcloud sql instances execute-sql eu-2 \
            --database=postgres \
            --sql="SELECT subname, pid, received_lsn, latest_end_lsn, last_msg_send_time, last_msg_receipt_time, now()-last_msg_receipt_time AS no_message_for FROM pg_stat_subscription;" \
            --format=json || true

          echo "==== pg_subscription ===="
          gcloud sql instances execute-sql eu-2 \
            --database=postgres \
            --sql="SELECT subname, subenabled, subslotname, subpublications FROM pg_subscription;" \
            --format=json || true

          echo "==== subscription rel states ===="
          gcloud sql instances execute-sql eu-2 \
            --database=postgres \
            --sql="SELECT sr.srrelid::regclass AS table_name, sr.srsubstate, sr.srsublsn FROM pg_subscription_rel sr JOIN pg_subscription s ON s.oid=sr.srsubid ORDER BY 1;" \
            --format=json || true

          echo "==== worker/apply activity ===="
          gcloud sql instances execute-sql eu-2 \
            --database=postgres \
            --sql="SELECT pid, usename, application_name, state, wait_event_type, wait_event, left(query,200) AS query FROM pg_stat_activity WHERE pid<>pg_backend_pid() ORDER BY backend_start NULLS LAST LIMIT 50;" \
            --format=json || true

          echo "==== blocking locks ===="
          gcloud sql instances execute-sql eu-2 \
            --database=postgres \
            --sql="SELECT blocked.pid AS blocked_pid, left(blocked.query,120) AS blocked_query, blocking.pid AS blocking_pid, left(blocking.query,120) AS blocking_query FROM pg_stat_activity blocked JOIN pg_locks bl ON bl.pid=blocked.pid AND NOT bl.granted JOIN pg_locks kl ON kl.locktype=bl.locktype AND kl.database IS NOT DISTINCT FROM bl.database AND kl.relation IS NOT DISTINCT FROM bl.relation AND kl.page IS NOT DISTINCT FROM bl.page AND kl.tuple IS NOT DISTINCT FROM bl.tuple AND kl.virtualxid IS NOT DISTINCT FROM bl.virtualxid AND kl.transactionid IS NOT DISTINCT FROM bl.transactionid AND kl.classid IS NOT DISTINCT FROM bl.classid AND kl.objid IS NOT DISTINCT FROM bl.objid AND kl.objsubid IS NOT DISTINCT FROM bl.objsubid AND kl.pid<>bl.pid AND kl.granted JOIN pg_stat_activity blocking ON blocking.pid=kl.pid LIMIT 30;" \
            --format=json || true

          echo "==== app_versions triggers ===="
          gcloud sql instances execute-sql eu-2 \
            --database=postgres \
            --sql="SELECT tgname, tgenabled FROM pg_trigger WHERE tgrelid='public.app_versions'::regclass AND NOT tgisinternal;" \
            --format=json || true

name: Build source code and deploy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "capgo-[0-9]*"

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Resolve deploy scope
    permissions:
      contents: read
    outputs:
      api: ${{ steps.scope.outputs.api }}
      files: ${{ steps.scope.outputs.files }}
      plugins: ${{ steps.scope.outputs.plugins }}
      supabase: ${{ steps.scope.outputs.supabase }}
      translation: ${{ steps.scope.outputs.translation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Resolve deploy scope
        id: scope
        env:
          REF_NAME: ${{ github.ref_name }}
        run: bun scripts/deploy-scope.ts "$REF_NAME" >> "$GITHUB_OUTPUT"

  # Tests already passed before tag was created, so just build and deploy
  supabase_deploy:
    needs: changes
    if: ${{ needs.changes.outputs.supabase == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Build code and deploy to Supabase
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Set environment variable
        run: |
          if [[ ${{ github.ref }} == *-alpha* ]]; then
            echo "SUPA_ENV=ALPHA" >> $GITHUB_ENV
          else
            echo "SUPA_ENV=PROD" >> $GITHUB_ENV
          fi
      - name: Set Supabase credentials (ALPHA)
        if: env.SUPA_ENV == 'ALPHA'
        run: |
          echo "SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_DB_PASS_ALPHA }}" >> $GITHUB_ENV
          echo "SUPABASE_PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID_ALPHA }}" >> $GITHUB_ENV

      - name: Set Supabase credentials (PROD)
        if: env.SUPA_ENV == 'PROD'
        run: |
          echo "SUPABASE_DB_PASSWORD=${{ secrets.SUPABASE_DB_PASS_PROD }}" >> $GITHUB_ENV
          echo "SUPABASE_PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID_PROD }}" >> $GITHUB_ENV
      - name: Install dependencies
        run: bun install
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2.0.0
        # Pinned to 2.98.2 because Supabase CLI v2.99.0 (2026-05-18) ships
        # release assets with version in the filename (supabase_2.99.0_linux_amd64.tar.gz)
        # while setup-cli@v2.0.0 hardcodes the unversioned name
        # (supabase_linux_amd64.tar.gz) for any version >= 1.28.0, causing 404.
        # Revert to `latest` once setup-cli ships a fix or Supabase restores
        # the unversioned assets. Tracking: https://github.com/supabase/setup-cli
        with:
          version: 2.98.2
      - name: Show Supabase CLI version
        run: supabase --version
      - name: Prepare Supabase
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
      - name: Apply Supabase Migrations
        run: supabase db push
      - name: Update functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
        run: supabase functions deploy

  deploy_webapp:
    needs: [changes, supabase_deploy]
    if: ${{ always() && needs.changes.result == 'success' && (needs.supabase_deploy.result == 'success' || needs.supabase_deploy.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Set environment variable
        run: |
          if [[ ${{ github.ref }} == *-alpha* ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
            echo "CHANNEL=dev" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
            echo "CHANNEL=production" >> $GITHUB_ENV
          fi
      - name: Build
        run: bun ${{ env.ENV == 'prod' && 'build:mobile' || 'build:dev:mobile' }}
        env:
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
      - name: Generate AI changelog
        id: changelog
        uses: mistricky/ccc@v0.2.6
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          model: claude-sonnet-4-5-20250929
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Publish CF console
        run: bun run deploy:cloudflare:console:${{ env.ENV }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Capgo
        run: bunx @capgo/cli@latest bundle upload --channel ${{ env.CHANNEL }}  --delta
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 🆕 Changelog

            ${{ steps.changelog.outputs.result }}

            ---

            🔗 **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.changelog.outputs.from_tag }}...${{ steps.changelog.outputs.to_tag }}
          make_latest: true
          token: "${{ secrets.PERSONAL_ACCESS_TOKEN }}"
          prerelease: ${{ contains(github.ref, '-alpha.') }}

  deploy_api:
    needs: [changes, supabase_deploy]
    if: ${{ always() && needs.changes.result == 'success' && needs.changes.outputs.api == 'true' && (needs.supabase_deploy.result == 'success' || needs.supabase_deploy.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Set environment variable
        run: |
          if [[ ${{ github.ref }} == *-alpha* ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
          fi
      - name: Deploy CF Worker API
        run: bun run deploy:cloudflare:api:${{ env.ENV }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy_translation_worker:
    needs: [changes, supabase_deploy]
    if: ${{ always() && needs.changes.result == 'success' && needs.changes.outputs.translation == 'true' && (needs.supabase_deploy.result == 'success' || (needs.supabase_deploy.result == 'skipped' && needs.changes.outputs.supabase != 'true')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Set environment variable
        run: |
          if [[ ${{ github.ref }} == *-alpha* ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
          fi
      - name: Deploy CF Worker Translation
        run: bun run deploy:cloudflare:translation:${{ env.ENV }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy_files:
    needs: [changes, supabase_deploy]
    if: ${{ always() && needs.changes.result == 'success' && needs.changes.outputs.files == 'true' && (needs.supabase_deploy.result == 'success' || needs.supabase_deploy.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Set environment variable
        run: |
          if [[ ${{ github.ref }} == *-alpha* ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
          fi
      - name: Deploy CF Worker Files
        run: bun run deploy:cloudflare:files:${{ env.ENV }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy_plugin_regions:
    needs: [changes, supabase_deploy]
    if: ${{ always() && needs.changes.result == 'success' && needs.changes.outputs.plugins == 'true' && (needs.supabase_deploy.result == 'success' || needs.supabase_deploy.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        region: [eu, as, us, sa, oc, af, me, hk, jp]
        include:
          - region: eu
            region_label: Europe (EU)
            cf_target: plugin_eu
          - region: as
            region_label: Asia (AS)
            cf_target: plugin_as
          - region: us
            region_label: United States (US)
            cf_target: plugin_na
          - region: sa
            region_label: South America (SA)
            cf_target: plugin_sa
          - region: oc
            region_label: Oceania (OC)
            cf_target: plugin_oc
          - region: af
            region_label: Africa (AF)
            cf_target: plugin_af
          - region: me
            region_label: Middle East (ME)
            cf_target: plugin_me
          - region: hk
            region_label: Hong Kong (HK)
            cf_target: plugin_hk
          - region: jp
            region_label: Japan (JP)
            cf_target: plugin_jp
    name: Deploy CF Worker Plugin (${{ matrix.region_label }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Set environment variable
        run: |
          if [[ ${{ github.ref }} == *-alpha* ]]; then
            echo "ENV=dev" >> $GITHUB_ENV
          else
            echo "ENV=prod" >> $GITHUB_ENV
          fi
      - name: Deploy CF Worker Plugin
        run: bun run deploy:cloudflare:${{ matrix.cf_target }}:${{ env.ENV }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

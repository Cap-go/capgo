name: Build and publish CLI keychain helper

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a publish mid-flight: cancelling between the arm64 and x64
  # `npm publish` steps leaves the release half-published, and the retry then
  # fails with "version already exists". Queue instead.
  cancel-in-progress: false

on:
  # Normal release: the deliberate button (choose the version).
  workflow_dispatch:
    inputs:
      version:
        description: "Helper version to publish, e.g. 1.0.0 (no 'cli-helper-' prefix)"
        required: true
  # Also fires on a pushed cli-helper-X.Y.Z tag — lets you test the whole
  # pipeline from a PR branch (tag a branch commit) without merging first.
  push:
    tags:
      - "cli-helper-[0-9]*"

permissions: {}

jobs:
  publish_cli_helper:
    runs-on: macos-latest
    name: Build, sign, notarize, publish keychain helper
    timeout-minutes: 45
    permissions:
      # The workflow creates the cli-helper-<version> tag + GitHub release with
      # the built-in GITHUB_TOKEN. That is loop-safe: a GITHUB_TOKEN-created tag
      # does NOT re-trigger the push:tags trigger above (a PAT-created tag would).
      contents: write
      # required for `npm publish --provenance` (mints the OIDC token).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
      - name: Resolve + validate version
        id: version
        run: |
          # Two ways in: the workflow_dispatch button (version input), or
          # pushing a cli-helper-X.Y.Z tag (e.g. to test from a PR branch).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#cli-helper-}"
          fi
          if ! echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::version '$v' is not semver (e.g. 1.0.0)"; exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          # Prereleases (e.g. 1.0.0-rc.4) publish under the `rc` dist-tag so they
          # stay off the default install; stable versions go to `latest`.
          if printf '%s' "$v" | grep -q '-'; then
            echo "npm_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build helper bundles
        run: bash cli-helper/scripts/build.sh "${{ steps.version.outputs.version }}"
      - name: Import Developer ID certificate into throwaway keychain
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in imported cert"
            exit 1
          fi
          echo "DEVELOPER_ID_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
      - name: Write App Store Connect API key
        env:
          APPLE_KEY_CONTENT: ${{ secrets.APPLE_KEY_CONTENT }}
        run: |
          # APPLE_KEY_CONTENT is stored base64-encoded (the Capgo CLI's own
          # convention — see cli/src/sdk.ts). Accept raw PEM too, then validate:
          # notarytool fails with the opaque 'Error: invalidAsn1' on a bad key.
          if printf '%s' "$APPLE_KEY_CONTENT" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "$APPLE_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
          else
            printf '%s' "$APPLE_KEY_CONTENT" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          fi
          openssl pkey -in "$RUNNER_TEMP/AuthKey.p8" -noout 2>/dev/null \
            || { echo "::error::APPLE_KEY_CONTENT does not decode to a valid .p8 private key (tried raw PEM and base64)"; exit 1; }
          echo "APPLE_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - name: Sign and notarize
        env:
          # Public (not a secret): the team ID appears in the cert subject and
          # every signed binary. Must match macos-signing.ts's CAPGO_APPLE_TEAM_ID.
          CAPGO_APPLE_TEAM_ID: UVTJ336J2D
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: bash cli-helper/scripts/sign-and-notarize.sh
      - name: Smoke test signed binary
        run: |
          arch="$(uname -m)"
          case "$arch" in
            arm64) helper="./cli-helper/dist/arm64/Capgo.app/Contents/MacOS/capgo" ;;
            x86_64) helper="./cli-helper/dist/x64/Capgo.app/Contents/MacOS/capgo" ;;
            *) echo "::error::unsupported runner arch: $arch"; exit 1 ;;
          esac
          set +e
          out=$("$helper")
          code=$?
          set -e
          [ "$code" -ne 0 ] || { echo "::error::expected non-zero exit"; exit 1; }
          echo "$out" | jq -e '.ok == false and .errorCode == "INVALID_ARGS"' > /dev/null \
            || { echo "::error::unexpected helper output: $out"; exit 1; }
      - name: Gate test — keychain-export without handshake is FORBIDDEN_CALLER
        run: |
          arch="$(uname -m)"
          case "$arch" in
            arm64) helper="./cli-helper/dist/arm64/Capgo.app/Contents/MacOS/capgo" ;;
            x86_64) helper="./cli-helper/dist/x64/Capgo.app/Contents/MacOS/capgo" ;;
            *) echo "::error::unsupported runner arch: $arch"; exit 1 ;;
          esac
          # No --invoked-by: the caller gate must reject before anything else
          # (the wrap passphrase is read from stdin, not argv, so none is passed).
          set +e
          out=$("$helper" keychain-export --sha1 "$(printf 'a%.0s' {1..40})" --output /tmp/x.p12 < /dev/null | cat)
          set -e
          echo "$out" | jq -e '.ok == false and .errorCode == "FORBIDDEN_CALLER"' > /dev/null \
            || { echo "::error::gate did not reject missing handshake: $out"; exit 1; }
      - name: Gate test — valid handshake + stdin passphrase reaches keychain lookup
        run: |
          arch="$(uname -m)"
          case "$arch" in
            arm64) helper="./cli-helper/dist/arm64/Capgo.app/Contents/MacOS/capgo" ;;
            x86_64) helper="./cli-helper/dist/x64/Capgo.app/Contents/MacOS/capgo" ;;
            *) echo "::error::unsupported runner arch: $arch"; exit 1 ;;
          esac
          # WITH the handshake and a passphrase on stdin, the helper passes the gate,
          # reads the passphrase, and fails only at the keychain lookup (the random
          # SHA1 matches nothing). This guards the stdin passphrase interface.
          set +e
          out=$(printf 'wrap-pass\n' | "$helper" keychain-export --sha1 "$(printf 'a%.0s' {1..40})" --output /tmp/x.p12 --invoked-by capgo-cli | cat)
          set -e
          echo "$out" | jq -e '.ok == false and .errorCode == "NO_IDENTITY"' > /dev/null \
            || { echo "::error::expected NO_IDENTITY with handshake + stdin passphrase: $out"; exit 1; }
      - name: Prepare packages
        run: node cli-helper/scripts/prepare-publish.mjs "${{ steps.version.outputs.version }}"
      # Publish under the `rc` dist-tag while the package is new/unproven, so it
      # never becomes npm `latest`. This does NOT affect @capgo/cli installs:
      # its optionalDependencies `^1.0.0` resolve against published versions, not
      # dist-tags. To promote to stable later, either change `--tag rc` to drop
      # the flag, or run: npm dist-tag add <pkg>@<version> latest
      - name: Publish darwin-arm64
        working-directory: cli-helper/npm/darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag ${{ steps.version.outputs.npm_tag }}
      - name: Publish darwin-x64
        working-directory: cli-helper/npm/darwin-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag ${{ steps.version.outputs.npm_tag }}
      - name: Zip signed bundles for release assets
        run: |
          ditto -c -k --keepParent cli-helper/dist/arm64/Capgo.app cli-helper/dist/Capgo-arm64.zip
          ditto -c -k --keepParent cli-helper/dist/x64/Capgo.app   cli-helper/dist/Capgo-x64.zip
      - name: Create tag + GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-helper-${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            cli-helper/dist/Capgo-arm64.zip
            cli-helper/dist/Capgo-x64.zip
          make_latest: false
          # Built-in token (NOT a PAT): a GITHUB_TOKEN-created tag does not
          # re-trigger this workflow's push:tags trigger, avoiding a publish loop.
          token: "${{ github.token }}"

[files]
extend-exclude = [
  "test/data.ts"
]

# "CIPS" is a real App Store Connect role/plumbing value in Apple's session
# payload (see native/asc-key-helper/Sources/Models/ASCSession.swift), not a typo.
[default.extend-words]
CIPS = "CIPS"

# Apple developer-portal vocabulary and other domain words the CI typos
# checker mis-flags. Add identifiers here as "wrong" = "right" — but to
# accept them as-is we set the value to the same word.
[default.extend-words]
UDID = "UDID"
unparseable = "unparseable"
